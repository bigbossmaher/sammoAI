spring:
  application:
    name: sammo-ai-backend
  datasource:
    url: jdbc:h2:mem:sammoai;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080

# CORS for frontend (React dev server)
sammo:
  cors:
    allowed-origins: http://localhost:5173,http://localhost:3000
  ml-service-url: http://localhost:8000
  anomaly-threshold: 0.3
